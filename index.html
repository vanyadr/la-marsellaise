<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>La Marsellaise</title>

    <link rel="stylesheet" href="./style.css"/>
    <script type="module" src="./script.js" defer></script>
</head>
<body>

<header>
    <div class="header container">
        <nav class="header__btns">
            <a href="#about" class="header__link">О нас</a>
            <a href="#menu" class="header__link">Меню</a>
            <a href="#events" class="header__link">События</a>
            <a href="#delivery" class="header__link">Доставка</a>
            <a href="#contacts" class="header__link">Контакты</a>
        </nav>
        <div class="header__contact">
            <a href="https://yandex.ru/maps/-/CLWCRCiI" target="_blank" rel="noopener" class="header__contact-link">
                Набережная Мартынова, 16,
            </a>
            <a href="https://yandex.ru/maps/-/CLWCRCiI" target="_blank" rel="noopener" class="header__contact-link">
                Санкт-Петербург
            </a>
        </div>
    </div>
</header>
<main>
    <section class="screen section" id="home">
        <div class="screen__bg" id="screen-bg">
            <img src="./assets/images/bg.jpg" alt="Фон"/>
        </div>
        <div class="screen__container">
            <div class="screen__logo">
                <img src="./assets/images/logo.svg" alt="Логотип"/>
            </div>
            <p class="screen__subtitle">Ресторан французской кухни и кондитерская на Крестовском острове</p>
            <div class="screen__time-block">
                <div class="screen__time">пн-пт 9:00-22:00</div>
                <div class="screen__time">чт-сб 10:00-22:00</div>
            </div>
            <a class="screen__btn">Забронировать стол</a>
        </div>
        <div class="screen__down-block">
            <div class="screen__socials">
                <a href="" class="screen__socials-item">
                    <img src="./assets/images/tg.svg" alt="Telegram">
                </a>
                <a href="" class="screen__socials-item">
                    <img src="./assets/images/vk.svg" alt="VK">
                </a>
                <a href="" class="screen__socials-item">
                    <img src="./assets/images/phone.svg" alt="Звонок">
                </a>
            </div>
            <div class="screen__info">
                <a href="https://yandex.ru/maps/-/CLWCRCiI" target="_blank" rel="noopener" class="header__contact-link">
                    Набережная Мартынова, 16,
                </a>
                <a href="https://yandex.ru/maps/-/CLWCRCiI" target="_blank" rel="noopener" class="header__contact-link">
                    Санкт-Петербург
                </a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
